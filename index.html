<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Set-Sot — Kartu Shedding Game</title>
  <meta name="description" content="Permainan kartu Set-Sot dengan mekanik bom dan joker.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==================== SETUP SCREEN ==================== -->
  <div id="setup-screen" class="screen active">
    <div class="setup-card">
      <div class="setup-logo">♠♥♦♣</div>
      <h1>Set-Sot</h1>
      <p class="setup-subtitle">Shedding Card Game</p>

      <div class="setting-row">
        <span class="setting-label">Jumlah Pemain</span>
        <div class="stepper" id="stepper-players">
          <button class="stepper-btn" data-dir="-1" aria-label="Kurangi pemain">−</button>
          <span class="stepper-val" id="val-players">4</span>
          <button class="stepper-btn" data-dir="1" aria-label="Tambah pemain">+</button>
        </div>
      </div>

      <div class="setting-row">
        <span class="setting-label">Jumlah Dek</span>
        <div class="stepper" id="stepper-decks">
          <button class="stepper-btn" data-dir="-1" aria-label="Kurangi dek">−</button>
          <span class="stepper-val" id="val-decks">1</span>
          <button class="stepper-btn" data-dir="1" aria-label="Tambah dek">+</button>
        </div>
      </div>

      <div class="setting-info" id="setting-info">54 kartu · 13 kartu/pemain</div>

      <button id="btn-start" class="btn-primary">Mulai Permainan</button>
    </div>
  </div>

  <!-- ==================== GAME SCREEN ==================== -->
  <div id="game-screen" class="screen">
    <!-- Top bar -->
    <header class="game-header">
      <button id="btn-menu" class="header-btn" title="Kembali">✕</button>
      <div id="game-status" class="game-status">Giliran: Kamu</div>
      <div id="round-badge" class="round-badge">Putaran 1</div>
    </header>

    <!-- Opponents row -->
    <section class="opponents" id="opponents"></section>

    <!-- Play area (table) -->
    <section class="table-area">
      <div class="table-surface">
        <div class="table-felt-pattern"></div>
        <div class="table-label" id="table-label">Meja kosong — mainkan kartu</div>
        <div class="table-cards" id="table-cards"></div>
        <div class="table-pattern" id="table-pattern"></div>
      </div>
    </section>

    <!-- Game log -->
    <section class="game-log" id="game-log"></section>

    <!-- Player hand -->
    <section class="player-section">
      <div id="your-turn-anim" class="your-turn-anim">Giliranmu!</div>
      <div class="hand-info">
        <span id="hand-count">13 kartu</span>
      </div>
      <div class="player-hand" id="player-hand"></div>
      <div class="action-bar">
        <button id="btn-pass" class="btn-action btn-pass" disabled>Pass</button>
        <button id="btn-play" class="btn-action btn-play" disabled>Mainkan</button>
        <button id="btn-skip" class="btn-action btn-play hidden" style="background:#E5342E; display:none;">Lewati & Mulai Baru</button>
      </div>
    </section>
  </div>


  <!-- ==================== DEAL ANIMATION OVERLAY ==================== -->
  <div id="deal-overlay" class="deal-overlay hidden">
    <div class="deal-scene">
      <div class="deal-deck" id="deal-deck"></div>
      <div class="deal-text" id="deal-text">Mengocok kartu…</div>
    </div>
  </div>

  <!-- ==================== GAME OVER OVERLAY ==================== -->
  <div id="gameover-overlay" class="overlay hidden">
    <div class="overlay-card">
      <div class="overlay-icon" id="gameover-icon">🏆</div>
      <h2 id="gameover-title">Kamu Menang!</h2>
      <p id="gameover-sub">Selamat, semua kartu habis.</p>
      <button id="btn-restart" class="btn-primary">Bermain Lagi</button>
    </div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <script src="game.js"></script>
</body>
</html>
